<!-- verify.html -->
{% extends "base.html" %}
{% block content %}
<div style="max-width:500px; margin:48px auto;">
    <div class="card">
        <div class="card-header" style="flex-direction:column; align-items:center; text-align:center; padding-bottom:24px;">
            <div style="width:64px; height:64px; background:rgba(56,189,248,0.1); border:1px solid var(--border-mid); border-radius:var(--r-lg); display:flex; align-items:center; justify-content:center; font-size:1.8em; margin-bottom:16px;">
                🛡️
            </div>
            <div>
                <h2>Vérifier un document</h2>
                <p>Entrez l'ID du bloc pour contrôler l'intégrité</p>
            </div>
        </div>

        <form action="/verify-block" method="POST">
            <div class="form-group">
                <label><i class="fas fa-hashtag" style="color:var(--text-3); margin-right:6px;"></i> ID du bloc</label>
                <input type="number" name="block_id" class="form-control" placeholder="Ex: 42" required min="1">
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;">
                <i class="fas fa-circle-check"></i> Vérifier l'intégrité
            </button>
        </form>

        <div style="margin-top:24px; padding:16px; background:var(--bg-subtle); border-radius:var(--r-md); display:flex; gap:10px; align-items:flex-start;">
            <i class="fas fa-circle-info" style="color:var(--cyan); margin-top:2px; flex-shrink:0;"></i>
            <p style="font-size:0.85em; color:var(--text-3); line-height:1.6;">
                La vérification compare le hash enregistré sur la blockchain avec le hash actuel du fichier. Toute modification sera immédiatement détectée.
            </p>
        </div>
    </div>
</div>
{% endblock %}
