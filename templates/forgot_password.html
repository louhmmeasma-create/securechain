{% extends "base.html" %}
{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <div style="text-align:center; margin-bottom:28px;">
            <div style="width:56px; height:56px; background:var(--grad); border-radius:16px; display:inline-flex; align-items:center; justify-content:center; font-size:1.5em; margin-bottom:18px;">
                🔓
            </div>
            <h2>Mot de passe oublié</h2>
            <p class="auth-sub">Entrez votre email pour recevoir un lien de réinitialisation</p>
        </div>
        <form method="POST">
            <div class="form-group">
                <label><i class="fas fa-envelope" style="color:var(--text-3); margin-right:6px;"></i> Email</label>
                <input type="email" name="email" class="form-control" placeholder="vous@exemple.com" required autofocus>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%; margin-top:8px;">
                <i class="fas fa-paper-plane"></i> Envoyer le lien
            </button>
        </form>
        <p class="auth-link">
            <a href="/login"><i class="fas fa-arrow-left" style="font-size:0.85em;"></i> Retour à la connexion</a>
        </p>
    </div>
</div>
{% endblock %}
