{% extends "base.html" %}

{% block content %}
<div class="auth-wrapper" style="max-width:500px;">
    <div class="auth-card">

        <div style="text-align:center; margin-bottom:28px;">
            <div style="width:56px; height:56px; background:var(--grad); border-radius:16px; display:inline-flex; align-items:center; justify-content:center; font-size:1.5em; margin-bottom:18px; box-shadow:var(--shadow-btn);">
                📝
            </div>
            <h2>Créer un compte</h2>
            <p class="auth-sub">Rejoignez SecureChain en quelques secondes</p>
        </div>

        <form method="POST">
            <div class="form-group">
                <label><i class="fas fa-user" style="color:var(--text-3); margin-right:6px;"></i> Nom d'utilisateur</label>
                <input type="text" name="username" class="form-control" placeholder="Choisissez un identifiant" required autofocus>
            </div>
            <div class="form-group">
                <label><i class="fas fa-envelope" style="color:var(--text-3); margin-right:6px;"></i> Email</label>
                <input type="email" name="email" class="form-control" placeholder="vous@exemple.com" required>
            </div>
            <div class="form-group">
                <label><i class="fas fa-lock" style="color:var(--text-3); margin-right:6px;"></i> Mot de passe</label>
                <input type="password" name="password" id="password" class="form-control" placeholder="••••••••" required minlength="8">
                <!-- Strength bars -->
                <div class="strength-bars" style="margin-top:10px;">
                    <div class="strength-bar" id="strength1"></div>
                    <div class="strength-bar" id="strength2"></div>
                    <div class="strength-bar" id="strength3"></div>
                </div>
                <p class="strength-text" id="strengthText"></p>
            </div>

            <!-- Requirements -->
            <div class="req-list">
                <p><i class="fas fa-shield-halved" style="color:var(--cyan); margin-right:6px;"></i> Exigences de sécurité</p>
                <ul>
                    <li id="req-length">❌ Au moins 8 caractères</li>
                    <li id="req-upper">❌ Au moins une majuscule</li>
                    <li id="req-number">❌ Au moins un chiffre</li>
                </ul>
            </div>

            <button type="submit" class="btn btn-primary" style="width:100%;">
                <i class="fas fa-user-plus"></i> Créer mon compte
            </button>
        </form>

        <p class="auth-link">
            Déjà un compte ? <a href="/login">Se connecter</a>
        </p>
    </div>
</div>

<script>
document.getElementById('password').addEventListener('input', function() {
    const v = this.value;
    const hasLen = v.length >= 8, hasUp = /[A-Z]/.test(v), hasNum = /[0-9]/.test(v);
    const mark = ok => ok ? '<span style="color:var(--emerald)">✅</span>' : '<span style="color:var(--rose)">❌</span>';
    document.getElementById('req-length').innerHTML = mark(hasLen) + ' Au moins 8 caractères';
    document.getElementById('req-upper').innerHTML  = mark(hasUp)  + ' Au moins une majuscule';
    document.getElementById('req-number').innerHTML = mark(hasNum) + ' Au moins un chiffre';

    const score = [hasLen, hasUp, hasNum].filter(Boolean).length;
    const bars  = [1,2,3].map(i => document.getElementById('strength'+i));
    const colors = { 0:'', 1:'var(--rose)', 2:'var(--amber)', 3:'var(--emerald)' };
    const labels = { 0:'', 1:'Faible', 2:'Moyen', 3:'Fort' };
    bars.forEach((b,i) => b.style.background = i < score ? colors[score] : 'var(--border)');
    const t = document.getElementById('strengthText');
    t.textContent = v.length ? labels[score] : '';
    t.style.color = colors[score];
});
</script>
{% endblock %}
