{% extends "base.html" %}
{% block content %}
<div style="max-width:480px; margin:48px auto;">
    <div class="card">
        <div style="text-align:center; padding:10px 0 24px;">
            <div style="width:72px; height:72px; background:rgba(251,191,36,0.1); border:1px solid rgba(251,191,36,0.25); border-radius:50%; display:inline-flex; align-items:center; justify-content:center; font-size:2em; margin-bottom:20px;">
                ⚠️
            </div>
            <h2 style="font-family:'Syne',sans-serif; font-size:1.4em; font-weight:700; margin-bottom:10px;">Fichier déjà existant</h2>
            <p style="color:var(--text-2);">
                Le fichier <strong style="color:var(--text-1);">"{{ file.filename }}"</strong> est déjà enregistré dans la blockchain.
            </p>
        </div>

        <div style="background:rgba(251,191,36,0.07); border:1px solid rgba(251,191,36,0.2); border-radius:var(--r-md); padding:16px; margin:4px 0 24px; text-align:center;">
            <p style="color:var(--amber); font-size:0.9em;">
                <i class="fas fa-triangle-exclamation" style="margin-right:6px;"></i>
                Souhaitez-vous l'ajouter quand même comme nouveau bloc ?
            </p>
        </div>

        <div style="display:flex; gap:12px;">
            <form action="/force-upload" method="POST" style="flex:1;">
                <button type="submit" class="btn btn-primary" style="width:100%;">
                    <i class="fas fa-check"></i> Oui, ajouter
                </button>
            </form>
            <a href="/my-files" class="btn btn-secondary" style="flex:1; text-align:center;">
                <i class="fas fa-xmark"></i> Annuler
            </a>
        </div>
    </div>
</div>
{% endblock %}
