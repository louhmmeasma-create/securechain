{% extends "base.html" %}
{% block content %}
<div style="max-width:480px; margin:48px auto;">
    <div class="auth-card">
        <h2>Configurer la 2FA</h2>
        <p class="auth-sub">Double authentification via Google Authenticator</p>

        <div style="background:var(--bg-subtle); border:1px solid var(--border); border-radius:var(--r-lg); padding:24px; margin:20px 0; text-align:center;">
            <p style="font-size:0.88em; color:var(--text-3); margin-bottom:16px;">
                <span style="display:inline-flex; align-items:center; justify-content:center; width:24px; height:24px; background:var(--grad); border-radius:50%; color:#fff; font-weight:700; font-size:0.8em; margin-right:8px;">1</span>
                Scannez avec <strong style="color:var(--text-2);">Google Authenticator</strong>
            </p>
            <div class="qr-container">
                <img src="data:image/png;base64,{{ qr_code }}" alt="QR Code 2FA">
            </div>
        </div>

        <div style="text-align:center; margin-bottom:24px;">
            <p style="font-size:0.88em; color:var(--text-3); margin-bottom:12px;">
                <span style="display:inline-flex; align-items:center; justify-content:center; width:24px; height:24px; background:var(--grad); border-radius:50%; color:#fff; font-weight:700; font-size:0.8em; margin-right:8px;">2</span>
                Ou entrez ce code manuellement
            </p>
            <span class="secret-code">{{ secret }}</span>
        </div>

        <form action="/verify-2fa-setup" method="POST">
            <div class="form-group">
                <label><i class="fas fa-mobile-screen-button" style="color:var(--text-3); margin-right:6px;"></i> Code à 6 chiffres</label>
                <input type="text" name="code" class="form-control" placeholder="123456" maxlength="6" required
                       style="text-align:center; font-family:'JetBrains Mono',monospace; font-size:1.3em; letter-spacing:0.2em;">
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;">
                <i class="fas fa-shield-halved"></i> Vérifier et activer
            </button>
        </form>

        <p class="auth-link" style="margin-top:20px;">
            <a href="/profile"><i class="fas fa-arrow-left" style="font-size:0.85em;"></i> Retour au profil</a>
        </p>
    </div>
</div>
{% endblock %}
