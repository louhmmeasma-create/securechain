{% extends "base.html" %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">

        <div style="text-align:center; margin-bottom:28px;">
            <div style="width:56px; height:56px; background:var(--grad); border-radius:16px; display:inline-flex; align-items:center; justify-content:center; font-size:1.5em; margin-bottom:18px; box-shadow:var(--shadow-btn);">
                🔑
            </div>
            <h2>Connexion</h2>
            <p class="auth-sub">Accédez à votre espace sécurisé</p>
        </div>

        <form method="POST">
            <div class="form-group">
                <label><i class="fas fa-user" style="color:var(--text-3); margin-right:6px;"></i> Nom d'utilisateur</label>
                <input type="text" name="username" class="form-control" placeholder="Votre identifiant" required autofocus>
            </div>
            <div class="form-group">
                <label><i class="fas fa-lock" style="color:var(--text-3); margin-right:6px;"></i> Mot de passe</label>
                <input type="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%; margin-top:8px;">
                <i class="fas fa-arrow-right-to-bracket"></i> Se connecter
            </button>
        </form>

        <p class="auth-link">
            Pas encore de compte ? <a href="/register">Créer un compte</a>
        </p>
    </div>
</div>
{% endblock %}
