{% extends "base.html" %}
{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <div style="text-align:center; margin-bottom:28px;">
            <div style="width:56px; height:56px; background:var(--grad); border-radius:16px; display:inline-flex; align-items:center; justify-content:center; font-size:1.5em; margin-bottom:18px;">
                🔑
            </div>
            <h2>Nouveau mot de passe</h2>
            <p class="auth-sub">Choisissez un nouveau mot de passe sécurisé</p>
        </div>
        <form method="POST">
            <div class="form-group">
                <label><i class="fas fa-lock" style="color:var(--text-3); margin-right:6px;"></i> Nouveau mot de passe</label>
                <input type="password" name="new_password" id="password" class="form-control" placeholder="••••••••" required minlength="8">
                <div class="strength-bars" style="margin-top:10px;">
                    <div class="strength-bar" id="strength1"></div>
                    <div class="strength-bar" id="strength2"></div>
                    <div class="strength-bar" id="strength3"></div>
                </div>
            </div>
            <div class="form-group">
                <label><i class="fas fa-lock" style="color:var(--text-3); margin-right:6px;"></i> Confirmer</label>
                <input type="password" name="confirm_password" class="form-control" placeholder="••••••••" required>
            </div>
            <div class="req-list">
                <ul>
                    <li id="req-length">❌ Au moins 8 caractères</li>
                    <li id="req-upper">❌ Au moins une majuscule</li>
                    <li id="req-number">❌ Au moins un chiffre</li>
                </ul>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%; margin-top:8px;">
                <i class="fas fa-floppy-disk"></i> Réinitialiser
            </button>
        </form>
    </div>
</div>
<script>
document.getElementById('password').addEventListener('input', function() {
    const v = this.value;
    const hasLen = v.length >= 8, hasUp = /[A-Z]/.test(v), hasNum = /[0-9]/.test(v);
    const mark = ok => ok ? '<span style="color:var(--emerald)">✅</span>' : '<span style="color:var(--rose)">❌</span>';
    document.getElementById('req-length').innerHTML = mark(hasLen) + ' Au moins 8 caractères';
    document.getElementById('req-upper').innerHTML  = mark(hasUp)  + ' Au moins une majuscule';
    document.getElementById('req-number').innerHTML = mark(hasNum) + ' Au moins un chiffre';
    const score = [hasLen, hasUp, hasNum].filter(Boolean).length;
    const colors = { 0:'', 1:'var(--rose)', 2:'var(--amber)', 3:'var(--emerald)' };
    [1,2,3].forEach(i => {
        document.getElementById('strength'+i).style.background = i <= score ? colors[score] : 'var(--border)';
    });
});
</script>
{% endblock %}
